<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3分钟测出孩子英语阅读隐患 | 鼎牛阅读</title>
<style>
  :root {
    --primary: #F5A623;
    --primary-dark: #E08E0B;
    --bg: #FFF8F0;
    --card: #FFFFFF;
    --text: #2D2D2D;
    --text-light: #6B6B6B;
    --danger: #E74C3C;
    --success: #27AE60;
    --border: #F0E0D0;
    --shadow: 0 4px 20px rgba(0,0,0,0.06);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: linear-gradient(180deg, #FFF5E8 0%, #FFF8F0 30%, #FFF 100%);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== Header ===== */
  .header {
    text-align: center;
    padding: 28px 0 16px;
  }
  .logo {
    font-size: 22px;
    font-weight: 800;
    color: var(--primary-dark);
    letter-spacing: 2px;
  }
  .logo span { color: var(--text); font-weight: 400; font-size: 14px; }

  /* ===== Progress Bar ===== */
  .progress-wrap {
    padding: 0 0 20px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--text-light);
  }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #F5A623, #F7C56C);
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ===== Card ===== */
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: var(--shadow);
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .question-num {
    font-size: 12px;
    color: var(--primary);
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .question-title {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .question-hint {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 24px;
  }

  /* ===== Options ===== */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    background: #FAFAFA;
    -webkit-tap-highlight-color: transparent;
  }
  .option:active {
    transform: scale(0.98);
  }
  .option.selected {
    border-color: var(--primary);
    background: #FFF8EC;
    box-shadow: 0 0 0 3px rgba(245,166,35,0.1);
  }

  .option-letter {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #F0F0F0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
    color: var(--text-light);
    transition: all 0.2s;
  }
  .option.selected .option-letter {
    background: var(--primary);
    color: #FFF;
  }

  .option-text {
    font-size: 15px;
    line-height: 1.5;
    padding-top: 3px;
  }
  .option-score {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
  }
  .option.selected .option-score {
    color: var(--primary);
  }

  /* Multi-select */
  .checkbox-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .check-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    background: #FAFAFA;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .check-option:active { transform: scale(0.98); }
  .check-option.checked {
    border-color: var(--primary);
    background: #FFF8EC;
  }

  .check-box {
    width: 22px; height: 22px;
    border: 2px solid #CCC;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .check-option.checked .check-box {
    background: var(--primary);
    border-color: var(--primary);
  }
  .check-option.checked .check-box::after {
    content: '✓';
    color: #FFF;
    font-size: 14px;
    font-weight: 700;
  }

  /* ===== Buttons ===== */
  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: auto;
    padding-top: 20px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.96); }

  .btn-prev {
    background: #F5F5F5;
    color: var(--text-light);
  }
  .btn-next {
    background: linear-gradient(135deg, #F5A623, #F0B840);
    color: #FFF;
    box-shadow: 0 4px 12px rgba(245,166,35,0.3);
  }
  .btn-next:disabled {
    background: #DDD;
    color: #AAA;
    box-shadow: none;
    cursor: not-allowed;
  }

  .btn-full {
    width: 100%;
    flex: none;
  }

  /* ===== Result Page ===== */
  .result-wrap {
    text-align: center;
  }
  .result-score {
    font-size: 64px;
    font-weight: 900;
    color: var(--primary);
    line-height: 1;
  }
  .result-score span {
    font-size: 24px;
    font-weight: 400;
    color: var(--text-light);
  }

  .result-grade {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: 700;
    margin: 12px 0 20px;
  }
  .grade-excellent { background: #E8F8EF; color: #1E8449; }
  .grade-warning { background: #FFF3E0; color: #E67E22; }
  .grade-danger { background: #FFF0ED; color: #C0392B; }
  .grade-critical { background: #FDE8E8; color: #A93226; }

  .result-analysis {
    text-align: left;
    background: #FFFBF5;
    border-radius: 12px;
    padding: 20px;
    margin: 16px 0;
    border: 1px solid var(--border);
  }
  .result-analysis h4 {
    font-size: 15px;
    margin-bottom: 10px;
    color: var(--primary-dark);
  }
  .result-analysis p {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-light);
  }

  .result-dimensions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 16px 0;
  }
  .dim-badge {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
  }
  .dim-strong { background: #E8F8EF; color: #1E8449; }
  .dim-weak { background: #FFF0ED; color: #C0392B; }
  .dim-mid { background: #FFF8EC; color: #E67E22; }

  /* ===== Lead Capture ===== */
  .lead-section {
    margin-top: 20px;
  }
  .lead-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .lead-subtitle {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 16px;
  }

  .form-group {
    margin-bottom: 12px;
  }
  .form-group input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 15px;
    outline: none;
    transition: border 0.2s;
    background: #FAFAFA;
  }
  .form-group input:focus {
    border-color: var(--primary);
    background: #FFF;
  }

  .btn-submit {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    border: none;
    background: linear-gradient(135deg, #E74C3C, #F05A4A);
    color: #FFF;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 4px 16px rgba(231,76,60,0.3);
  }
  .btn-submit:active { transform: scale(0.96); }

  .urgency-tag {
    display: inline-block;
    background: #FDE8E8;
    color: #C0392B;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 12px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.5; }
  }

  /* ===== Admin Table ===== */
  .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-阅读小达人 { background:#E8F8EF; color:#1E8449; }
  .tag-拼读断层预警 { background:#FFF3E0; color:#E67E22; }
  .tag-启蒙关键期 { background:#FFF0ED; color:#C0392B; }
  .tag-紧急状态 { background:#FDE8E8; color:#A93226; }

  /* ===== Radar Chart ===== */
  .radar-wrap {
    position: relative;
    width: 260px; height: 260px;
    margin: 16px auto;
  }
  .radar-wrap canvas {
    width: 100%; height: 100%;
  }

  /* ===== Picture Question ===== */
  .pic-question-img {
    width: 100%;
    max-width: 280px;
    margin: 0 auto 16px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #FFFBF5;
    border: 2px dashed var(--border);
    padding: 24px;
    font-size: 80px;
  }
  .pic-question-label {
    text-align: center;
    font-size: 13px;
    color: var(--text-light);
    margin-top: 4px;
  }

  /* ===== Share Modal ===== */
  .share-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .share-card {
    background: #FFF;
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    max-width: 360px;
    width: 100%;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .share-card .share-icon {
    font-size: 56px;
    margin-bottom: 12px;
  }
  .share-card h3 {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .share-card p {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .btn-share {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    border: none;
    background: linear-gradient(135deg, #27AE60, #2ECC71);
    color: #FFF;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(39,174,96,0.3);
    margin-bottom: 10px;
  }
  .btn-share:active { transform: scale(0.96); }
  .btn-skip {
    background: none;
    border: none;
    color: #BBB;
    font-size: 13px;
    cursor: pointer;
    padding: 8px;
  }

  /* ===== Share Banner in Result ===== */
  .share-banner {
    background: linear-gradient(135deg, #E8F8EF, #D5F5E3);
    border-radius: 14px;
    padding: 16px;
    margin: 16px 0;
    text-align: center;
    cursor: pointer;
    border: 1.5px dashed #27AE60;
    transition: all 0.2s;
  }
  .share-banner:active { transform: scale(0.97); }
  .share-banner .banner-title {
    font-size: 15px;
    font-weight: 700;
    color: #1E8449;
    margin-bottom: 4px;
  }
  .share-banner .banner-sub {
    font-size: 12px;
    color: #27AE60;
  }

  /* ===== Start Page ===== */
  .start-page {
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    flex: 1;
  }
  .start-icon {
    font-size: 72px;
    margin-bottom: 20px;
  }
  .start-title {
    font-size: 24px;
    font-weight: 900;
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .start-title .hl {
    color: var(--primary);
  }
  .start-subtitle {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 32px;
    line-height: 1.6;
  }
  .btn-start {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    font-size: 18px;
    font-weight: 700;
    border: none;
    background: linear-gradient(135deg, #F5A623, #F0B840);
    color: #FFF;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 6px 24px rgba(245,166,35,0.4);
  }

  .features-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 24px;
  }
  .feature-item {
    text-align: center;
    font-size: 12px;
    color: var(--text-light);
  }
  .feature-item .icon {
    font-size: 24px;
    display: block;
    margin-bottom: 4px;
  }

  /* ===== Footer ===== */
  .footer {
    text-align: center;
    padding: 24px 0;
    font-size: 12px;
    color: #BBB;
  }

  /* ===== Hidden ===== */
  .hidden { display: none !important; }

  /* ===== Responsive ===== */
  @media (max-width: 375px) {

  }
</style>

function renderQuestion(idx) {
  const q = questions[idx];
  progressWrap.classList.remove('hidden');
  const pct = Math.round((idx + 1) / questions.length * 100);

  document.getElementById('progressLabel').textContent = `第 ${idx+1}/${questions.length} 题`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;

  let optionsHTML = '';
  if (q.type === 'single' || q.type === 'picture') {
    optionsHTML = '<div class="options">';
    q.options.forEach((opt, oi) => {
      const sel = answers[q.id] === oi ? ' selected' : '';
      optionsHTML += `
        <div class="option${sel}" onclick="selectSingle(${idx}, ${oi})" id="opt-${idx}-${oi}">
          <div class="option-letter">${opt.letter}</div>
          <div>
            <div class="option-text">${opt.text}</div>
            <div class="option-score">${opt.score}分</div>
          </div>
        </div>`;
    });
    optionsHTML += '</div>';
  } else if (q.type === 'multi') {
    const selected = multiSelections[q.id] || [];
    optionsHTML = '<div class="checkbox-group">';
    q.options.forEach((opt, oi) => {
      const checked = selected.includes(oi) ? ' checked' : '';
      optionsHTML += `
        <div class="check-option${checked}" onclick="toggleMulti(${idx}, ${oi})" id="mopt-${idx}-${oi}">
          <div class="check-box"></div>
          <div class="option-text">${opt.text}</div>
        </div>`;
    });
    optionsHTML += '</div>';
    optionsHTML += `<p style="font-size:12px;color:var(--text-light);margin-top:8px;">已选 <b id="multiCount">${selected.length}</b> 项（每项扣3分，最多扣15分）</p>`;
  }

  const isFirst = idx === 0;
  const hasAnswer = (q.type === 'single' || q.type === 'picture') ? answers[q.id] !== undefined : (multiSelections[q.id] || []).length > 0;

  const pictureHTML = q.type === 'picture' ? `<div class="pic-question-img">${q.picture}</div><div class="pic-question-label">👆 让孩子指一指、选一选</div>` : '';

  cardArea.innerHTML = `
    <div class="question-num">${q.section}</div>
    <div class="question-title">${q.title}</div>
    <div class="question-hint">${q.hint}</div>
    ${pictureHTML}
    ${optionsHTML}
    <div class="btn-row">
      ${!isFirst ? '<button class="btn btn-prev" onclick="prevQ()">上一题</button>' : ''}
      <button class="btn btn-next${!isFirst ? '' : ' btn-full'}" id="btnNext" onclick="nextQ()" ${hasAnswer ? '' : 'disabled'}>
        ${idx < questions.length - 1 ? '下一题 →' : '查看诊断结果'}
      </button>
    </div>
  `;
}

// ===== ACTIONS =====
function startQuiz() {
  currentQ = 0;
  answers = {};
  multiSelections = {};
  totalScore = 0;
  renderQuestion(0);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectSingle(qIdx, optIdx) {
  answers[questions[qIdx].id] = optIdx;
  renderQuestion(qIdx);
}

function toggleMulti(qIdx, optIdx) {
  const qId = questions[qIdx].id;
  if (!multiSelections[qId]) multiSelections[qId] = [];
  const arr = multiSelections[qId];
  const pos = arr.indexOf(optIdx);
  if (pos >= 0) arr.splice(pos, 1);
  else arr.push(optIdx);
  renderQuestion(qIdx);
}

function nextQ() {
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion(currentQ);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    calcAndShowResult();
  }
}

function prevQ() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion(currentQ);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ===== SCORE CALC =====
function calcAndShowResult() {
  let score = 0;

  questions.forEach(q => {
    if (q.type === 'single' || q.type === 'picture') {
      const oi = answers[q.id];
      if (oi !== undefined) {
        score += q.options[oi].score;
      }
    } else if (q.type === 'multi') {
      // Q6: start from full 15, deduct per selection
      const sel = multiSelections[q.id] || [];
      const deduct = Math.min(sel.length * 3, 15);
      score += (15 - deduct);
    }
  });

  totalScore = score;
  renderResult(score);
}

function drawRadarChart(score) {
  const canvas = document.getElementById('radarChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w/2, cy = h/2, r = 100;

  // Scores for 6 dimensions (0-100)
  const dims = [
    { label: '语音解码', score: scoreForDim('decode') },
    { label: '句子理解', score: scoreForDim('sentence') },
    { label: '阅读兴趣', score: scoreForDim('interest') },
    { label: '学习方法', score: scoreForDim('method') },
    { label: '词汇积累', score: scoreForDim('vocab') },
    { label: '家长陪伴', score: scoreForDim('parent') }
  ];

  function scoreForDim(key) {
    switch(key) {
      case 'decode': { const a = answers[3]; return a === 0 ? 85 : a === 1 ? 45 : 15; }
      case 'sentence': { const a = answers[4]; return a === 0 ? 85 : a === 1 ? 35 : 10; }
      case 'interest': { const a = answers[5]; return a === 0 ? 85 : a === 1 ? 40 : 10; }
      case 'method': { const a = answers[9]; return a === 0 ? 85 : a === 1 ? 45 : 15; }
      case 'vocab': { return Math.min(90, Math.max(20, score * 0.85)); }
      case 'parent': { const a = answers[10]; return a === 0 ? 85 : a === 1 ? 45 : 15; }
      default: return 50;
    }
  }

  ctx.clearRect(0, 0, w, h);

  // Background hexagon rings
  for (let ring = 1; ring <= 4; ring++) {
    ctx.beginPath();
    ctx.strokeStyle = '#F0E0D0';
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      const angle = Math.PI / 6 + (Math.PI * 2 / 6) * i;
      const rr = r * ring / 4;
      const x = cx + rr * Math.cos(angle);
      const y = cy + rr * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
  }

  // Axis lines
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 6 + (Math.PI * 2 / 6) * i;
    ctx.beginPath();
    ctx.strokeStyle = '#E8D5C0';
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    ctx.stroke();
  }

  // Data polygon
  ctx.beginPath();
  ctx.fillStyle = 'rgba(245, 166, 35, 0.2)';
  ctx.strokeStyle = '#F5A623';
  ctx.lineWidth = 2.5;
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 6 + (Math.PI * 2 / 6) * i;
    const val = dims[i].score / 100;
    const rr = r * val;
    const x = cx + rr * Math.cos(angle);
    const y = cy + rr * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Dots at vertices
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 6 + (Math.PI * 2 / 6) * i;
    const val = dims[i].score / 100;
    const rr = r * val;
    const x = cx + rr * Math.cos(angle);
    const y = cy + rr * Math.sin(angle);
    ctx.beginPath();
    ctx.fillStyle = '#F5A623';
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Labels
  ctx.fillStyle = '#6B6B6B';
  ctx.font = '12px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 6 + (Math.PI * 2 / 6) * i;
    const lr = r + 24;
    const x = cx + lr * Math.cos(angle);
    const y = cy + lr * Math.sin(angle) + 4;
    ctx.fillText(dims[i].label, x, y);
  }
}

function buildDimensionBadges() {
  const badges = [];
  // Decoding (Q3)
  const q3 = answers[3];
  if (q3 === 0) badges.push(['见词能读 ✓', 'dim-strong']);
  else if (q3 === 1) badges.push(['解码偏慢 △', 'dim-mid']);
  else badges.push(['不会解码 ✗', 'dim-weak']);

  // Sentence (Q4)
  const q4 = answers[4];
  if (q4 === 0) badges.push(['句子理解 ✓', 'dim-strong']);
  else if (q4 === 1) badges.push(['句子断档 △', 'dim-mid']);
  else badges.push(['读不懂句 ✗', 'dim-weak']);

  // Interest (Q5)
  const q5 = answers[5];
  if (q5 === 0) badges.push(['阅读兴趣 ✓', 'dim-strong']);
  else if (q5 === 1) badges.push(['兴趣不足 △', 'dim-mid']);
  else badges.push(['抵触阅读 ✗', 'dim-weak']);

  // Method (Q9 - was Q8 before adding picture question)
  const q9 = answers[9];
  if (q9 === 0) badges.push(['方法正确 ✓', 'dim-strong']);
  else if (q9 === 1) badges.push(['方法待优化 △', 'dim-mid']);
  else badges.push(['缺乏方法 ✗', 'dim-weak']);

  return badges.map(([label, cls]) => `<div class="dim-badge ${cls}">${label}</div>`).join('');
}

    });
  }

  cardArea.innerHTML = `
    <div style="padding:8px 0;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <div>
          <div style="font-size:20px;font-weight:800;">📊 线索管理后台</div>
          <div style="font-size:13px;color:var(--text-light);">共 <b>${leads.length}</b> 条线索（数据存储在浏览器本地）</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-prev" style="padding:8px 16px;font-size:13px;flex:none;" onclick="exportCSV()">导出CSV</button>
          <button class="btn btn-prev" style="padding:8px 16px;font-size:13px;flex:none;color:#E74C3C;" onclick="clearLeads()">清空</button>
          <button class="btn btn-prev" style="padding:8px 16px;font-size:13px;flex:none;" onclick="retakeQuiz()">返回问卷</button>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead>
            <tr style="background:#FFF8EC;text-align:left;">
              <th style="padding:12px;border-bottom:2px solid var(--border);">序号</th>
              <th style="padding:12px;border-bottom:2px solid var(--border);">称呼</th>
              <th style="padding:12px;border-bottom:2px solid var(--border);">手机号</th>
              <th style="padding:12px;border-bottom:2px solid var(--border);">孩子年龄</th>
              <th style="padding:12px;border-bottom:2px solid var(--border);">诊断结果</th>
              <th style="padding:12px;border-bottom:2px solid var(--border);">提交时间</th>
            </tr>
          </thead>
          <tbody>${rowsHTML}</tbody>
        </table>
      </div>
      <div style="margin-top:16px;padding:12px;background:#FFFBF5;border-radius:8px;font-size:12px;color:var(--text-light);line-height:1.8;">
        💡 <b>提示：</b>数据保存在当前浏览器的本地存储中。<br>
        🔗 你可以在当前浏览器访问 <b>?admin</b> 随时查看线索。<br>
        ⚠️ 更换浏览器或清除浏览器数据会导致线索丢失。正式使用建议接入后端接口存储。
      </div>
    </div>
  `;
}

function exportCSV() {
  const leads = JSON.parse(localStorage.getItem('dingniu_leads') || '[]');
  if (leads.length === 0) { alert('没有数据可导出'); return; }
  let csv = '﻿序号,称呼,手机号,孩子年龄,诊断等级,分数,提交时间\n';
  leads.forEach((l, i) => {
    csv += `${i + 1},${l.name},${l.phone},${l.age || ''},${l.grade},${l.score},${l.time}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '鼎牛阅读线索.csv'; a.click();
  URL.revokeObjectURL(url);
}

function clearLeads() {
  if (confirm('确定清空所有线索数据吗？此操作不可恢复！')) {
    localStorage.removeItem('dingniu_leads');
    renderAdmin();
  }
}

// ===== INIT =====
if (window.location.search.includes('admin')) {
  renderAdmin();
} else {
  renderStart();
}
</script>
</body>
</html>
