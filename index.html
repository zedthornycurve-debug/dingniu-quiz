<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3分钟测出孩子英语阅读隐患 | 鼎牛阅读</title>
<style>
  :root {
    --primary: #F5A623;
    --primary-dark: #E08E0B;
    --bg: #FFF8F0;
    --card: #FFFFFF;
    --text: #2D2D2D;
    --text-light: #6B6B6B;
    --danger: #E74C3C;
    --success: #27AE60;
    --border: #F0E0D0;
    --shadow: 0 4px 20px rgba(0,0,0,0.06);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: linear-gradient(180deg, #FFF5E8 0%, #FFF8F0 30%, #FFF 100%);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== Header ===== */
  .header {
    text-align: center;
    padding: 28px 0 16px;
  }
  .logo {
    font-size: 22px;
    font-weight: 800;
    color: var(--primary-dark);
    letter-spacing: 2px;
  }
  .logo span { color: var(--text); font-weight: 400; font-size: 14px; }

  /* ===== Progress Bar ===== */
  .progress-wrap {
    padding: 0 0 20px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--text-light);
  }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #F5A623, #F7C56C);
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ===== Card ===== */
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: var(--shadow);
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .question-num {
    font-size: 12px;
    color: var(--primary);
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .question-title {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .question-hint {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 24px;
  }

  /* ===== Options ===== */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    background: #FAFAFA;
    -webkit-tap-highlight-color: transparent;
  }
  .option:active {
    transform: scale(0.98);
  }
  .option.selected {
    border-color: var(--primary);
    background: #FFF8EC;
    box-shadow: 0 0 0 3px rgba(245,166,35,0.1);
  }

  .option-letter {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #F0F0F0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
    color: var(--text-light);
    transition: all 0.2s;
  }
  .option.selected .option-letter {
    background: var(--primary);
    color: #FFF;
  }

  .option-text {
    font-size: 15px;
    line-height: 1.5;
    padding-top: 3px;
  }
  .option-score {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
  }
  .option.selected .option-score {
    color: var(--primary);
  }

  /* Multi-select */
  .checkbox-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .check-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    background: #FAFAFA;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .check-option:active { transform: scale(0.98); }
  .check-option.checked {
    border-color: var(--primary);
    background: #FFF8EC;
  }

  .check-box {
    width: 22px; height: 22px;
    border: 2px solid #CCC;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .check-option.checked .check-box {
    background: var(--primary);
    border-color: var(--primary);
  }
  .check-option.checked .check-box::after {
    content: '✓';
    color: #FFF;
    font-size: 14px;
    font-weight: 700;
  }

  /* ===== Buttons ===== */
  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: auto;
    padding-top: 20px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.96); }

  .btn-prev {
    background: #F5F5F5;
    color: var(--text-light);
  }
  .btn-next {
    background: linear-gradient(135deg, #F5A623, #F0B840);
    color: #FFF;
    box-shadow: 0 4px 12px rgba(245,166,35,0.3);
  }
  .btn-next:disabled {
    background: #DDD;
    color: #AAA;
    box-shadow: none;
    cursor: not-allowed;
  }

  .btn-full {
    width: 100%;
    flex: none;
  }

  /* ===== Result Page ===== */
  .result-wrap {
    text-align: center;
  }
  .result-score {
    font-size: 64px;
    font-weight: 900;
    color: var(--primary);
    line-height: 1;
  }
  .result-score span {
    font-size: 24px;
    font-weight: 400;
    color: var(--text-light);
  }

  .result-grade {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: 700;
    margin: 12px 0 20px;
  }
  .grade-excellent { background: #E8F8EF; color: #1E8449; }
  .grade-warning { background: #FFF3E0; color: #E67E22; }
  .grade-danger { background: #FFF0ED; color: #C0392B; }
  .grade-critical { background: #FDE8E8; color: #A93226; }

  .result-analysis {
    text-align: left;
    background: #FFFBF5;
    border-radius: 12px;
    padding: 20px;
    margin: 16px 0;
    border: 1px solid var(--border);
  }
  .result-analysis h4 {
    font-size: 15px;
    margin-bottom: 10px;
    color: var(--primary-dark);
  }
  .result-analysis p {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-light);
  }

  .result-dimensions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 16px 0;
  }
  .dim-badge {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
  }
  .dim-strong { background: #E8F8EF; color: #1E8449; }
  .dim-weak { background: #FFF0ED; color: #C0392B; }
  .dim-mid { background: #FFF8EC; color: #E67E22; }

  /* ===== Lead Capture ===== */
  .lead-section {
    margin-top: 20px;
  }
  .lead-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .lead-subtitle {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 16px;
  }

  .form-group {
    margin-bottom: 12px;
  }
  .form-group input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 15px;
    outline: none;
    transition: border 0.2s;
    background: #FAFAFA;
  }
  .form-group input:focus {
    border-color: var(--primary);
    background: #FFF;
  }

  .btn-submit {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    border: none;
    background: linear-gradient(135deg, #E74C3C, #F05A4A);
    color: #FFF;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 4px 16px rgba(231,76,60,0.3);
  }
  .btn-submit:active { transform: scale(0.96); }

  .urgency-tag {
    display: inline-block;
    background: #FDE8E8;
    color: #C0392B;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 12px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.5; }
  }

  /* ===== Admin Table ===== */
  .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-阅读小达人 { background:#E8F8EF; color:#1E8449; }
  .tag-拼读断层预警 { background:#FFF3E0; color:#E67E22; }
  .tag-启蒙关键期 { background:#FFF0ED; color:#C0392B; }
  .tag-紧急状态 { background:#FDE8E8; color:#A93226; }

  /* ===== Radar Chart ===== */
  .radar-wrap {
    position: relative;
    width: 260px; height: 260px;
    margin: 16px auto;
  }
  .radar-wrap canvas {
    width: 100%; height: 100%;
  }

  /* ===== Picture Question ===== */
  .pic-question-img {
    width: 100%;
    max-width: 280px;
    margin: 0 auto 16px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #FFFBF5;
    border: 2px dashed var(--border);
    padding: 24px;
    font-size: 80px;
  }
  .pic-question-label {
    text-align: center;
    font-size: 13px;
    color: var(--text-light);
    margin-top: 4px;
  }

  /* ===== Share Modal ===== */
  .share-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .share-card {
    background: #FFF;
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    max-width: 360px;
    width: 100%;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .share-card .share-icon {
    font-size: 56px;
    margin-bottom: 12px;
  }
  .share-card h3 {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .share-card p {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .btn-share {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    border: none;
    background: linear-gradient(135deg, #27AE60, #2ECC71);
    color: #FFF;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(39,174,96,0.3);
    margin-bottom: 10px;
  }
  .btn-share:active { transform: scale(0.96); }
  .btn-skip {
    background: none;
    border: none;
    color: #BBB;
    font-size: 13px;
    cursor: pointer;
    padding: 8px;
  }

  /* ===== Share Banner in Result ===== */
  .share-banner {
    background: linear-gradient(135deg, #E8F8EF, #D5F5E3);
    border-radius: 14px;
    padding: 16px;
    margin: 16px 0;
    text-align: center;
    cursor: pointer;
    border: 1.5px dashed #27AE60;
    transition: all 0.2s;
  }
  .share-banner:active { transform: scale(0.97); }
  .share-banner .banner-title {
    font-size: 15px;
    font-weight: 700;
    color: #1E8449;
    margin-bottom: 4px;
  }
  .share-banner .banner-sub {
    font-size: 12px;
    color: #27AE60;
  }

  /* ===== Start Page ===== */
  .start-page {
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    flex: 1;
  }
  .start-icon {
    font-size: 72px;
    margin-bottom: 20px;
  }
  .start-title {
    font-size: 24px;
    font-weight: 900;
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .start-title .hl {
    color: var(--primary);
  }
  .start-subtitle {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 32px;
    line-height: 1.6;
  }
  .btn-start {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    font-size: 18px;
    font-weight: 700;
    border: none;
    background: linear-gradient(135deg, #F5A623, #F0B840);
    color: #FFF;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 6px 24px rgba(245,166,35,0.4);
  }

  .features-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 24px;
  }
  .feature-item {
    text-align: center;
    font-size: 12px;
    color: var(--text-light);
  }
  .feature-item .icon {
    font-size: 24px;
    display: block;
    margin-bottom: 4px;
  }

  /* ===== Footer ===== */
  .footer {
    text-align: center;
    padding: 24px 0;
    font-size: 12px;
    color: #BBB;
  }

  /* ===== Hidden ===== */
  .hidden { display: none !important; }

  /* ===== Complete Report ===== */
  .report-header {
    text-align: center;
    padding: 20px 16px;
    border: 2px solid #D4AF37;
    border-radius: 16px;
    background: linear-gradient(135deg, #FFFEF5, #FFF9E6);
    margin-bottom: 20px;
    position: relative;
  }
  .report-header .cert-badge {
    display: inline-block;
    background: linear-gradient(135deg, #D4AF37, #F0D060);
    color: #FFF;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .report-header h3 {
    font-size: 18px;
    font-weight: 800;
    margin: 8px 0 4px;
  }
  .report-header .report-id {
    font-size: 11px;
    color: #999;
    font-family: monospace;
  }
  .peer-compare {
    background: #F0F7FF;
    border-radius: 14px;
    padding: 18px 16px;
    margin-bottom: 16px;
    border: 1px solid #D6E8FF;
  }
  .peer-compare h4 {
    font-size: 14px;
    font-weight: 700;
    color: #2B6CB0;
    margin-bottom: 12px;
  }
  .peer-bar-wrap {
    position: relative;
    height: 28px;
    background: #E2E8F0;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .peer-bar-fill {
    height: 100%;
    border-radius: 14px;
    transition: width 1s ease;
  }
  .peer-bar-marker {
    position: absolute;
    top: -2px;
    width: 4px;
    height: 32px;
    background: #E74C3C;
    border-radius: 2px;
    transform: translateX(-50%);
  }
  .peer-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-light);
  }
  .peer-rank {
    text-align: center;
    margin-top: 8px;
    font-size: 15px;
    font-weight: 700;
    color: #2B6CB0;
  }
  .dim-detail {
    margin-bottom: 16px;
  }
  .dim-detail h4 {
    font-size: 15px;
    font-weight: 700;
    color: var(--primary-dark);
    margin-bottom: 12px;
  }
  .dim-item {
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .dim-item:last-child { border-bottom: none; margin-bottom: 0; }
  .dim-item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .dim-item-name {
    font-size: 14px;
    font-weight: 600;
  }
  .dim-item-score {
    font-size: 13px;
    font-weight: 700;
  }
  .dim-bar-wrap {
    height: 6px;
    background: #EEE;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .dim-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease;
  }
  .dim-bar-fill.high { background: #27AE60; }
  .dim-bar-fill.mid { background: #F5A623; }
  .dim-bar-fill.low { background: #E74C3C; }
  .dim-item-body {
    font-size: 12px;
    color: var(--text-light);
    line-height: 1.6;
  }
  .dim-subtitle {
    font-size: 12px;
    font-weight: 700;
    margin: 10px 0 4px;
  }
  .dim-item-tip {
    margin-top: 4px;
    font-size: 12px;
    color: var(--primary-dark);
    font-weight: 500;
  }
  .path-section {
    margin-bottom: 16px;
  }
  .path-section h4 {
    font-size: 15px;
    font-weight: 700;
    color: var(--primary-dark);
    margin-bottom: 12px;
  }
  .path-step {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    align-items: flex-start;
  }
  .path-step-num {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--primary);
    color: #FFF;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 14px;
    flex-shrink: 0;
  }
  .path-step-info {
    flex: 1;
  }
  .path-step-info .step-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .path-step-info .step-desc {
    font-size: 12px;
    color: var(--text-light);
    line-height: 1.5;
  }
  .match-card {
    background: linear-gradient(135deg, #FFF8EC, #FFFBF5);
    border-radius: 14px;
    padding: 18px 16px;
    margin-bottom: 16px;
    border: 1px solid #F0E0D0;
    text-align: center;
  }
  .match-card h4 {
    font-size: 14px;
    font-weight: 700;
    color: var(--primary-dark);
    margin-bottom: 4px;
  }
  .match-score {
    font-size: 40px;
    font-weight: 900;
    color: var(--primary);
  }
  .match-score span {
    font-size: 16px;
    color: var(--text-light);
  }
  .btn-print {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    border: 2px solid var(--primary);
    background: #FFF;
    color: var(--primary);
    cursor: pointer;
    margin-bottom: 16px;
    transition: all 0.2s;
  }
  .btn-print:active { transform: scale(0.96); background: #FFF8EC; }
  .divider {
    border: none;
    border-top: 1px dashed var(--border);
    margin: 20px 0;
  }
  .unlock-flash {
    animation: unlockPulse 0.6s ease 3;
  }
  @keyframes unlockPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(212,175,55,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(212,175,55,0); }
  }
  @media print {
    body { background: #FFF; -webkit-print-color-adjust: exact; }
    .container { max-width: 100%; }
    .btn-row, .btn, .btn-start, .btn-submit, .btn-print, .btn-share,
    .share-banner, .share-overlay, .lead-section, .footer, .header,
    .progress-wrap { display: none !important; }
    .card { box-shadow: none; padding: 0; }
    .report-header { break-inside: avoid; }
    .dim-item { break-inside: avoid; }
  }

  /* ===== Responsive ===== */
  @media (max-width: 375px) {
    .card { padding: 22px 18px; }
    .question-title { font-size: 16px; }
    .option-text { font-size: 14px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">鼎牛阅读<span> · 英语能力检测</span></div>
  </div>

  <!-- Progress (hidden on start/result) -->
  <div class="progress-wrap hidden" id="progressWrap">
    <div class="progress-info">
      <span id="progressLabel">第 1/10 题</span>
      <span id="progressPct">10%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:10%"></div>
    </div>
  </div>

  <!-- Main Card -->
  <div class="card" id="cardArea"></div>

  <!-- Footer -->
  <div class="footer">英语专业团队 & 鼎牛教育AI研发团队 联合出品</div>

</div>

<script>
// ===== QUESTION DATA =====
// Q1 (age) is always first. After it's answered, we build the rest based on age group.
const ageQuestion = {

      // Q6: start from full 15, deduct per selection
      const sel = multiSelections[q.id] || [];
      const deduct = Math.min(sel.length * 3, 15);
      score += (15 - deduct);

  totalScore = score;
  renderResult(score);

function drawRadarChart(score) {
  const canvas = document.getElementById('radarChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w/2, cy = h/2, r = 100;

  // Scores for 6 dimensions (0-100)
  const dims = [
    { label: '语音解码', score: scoreForDim('decode') },
    { label: '句子理解', score: scoreForDim('sentence') },
    { label: '阅读兴趣', score: scoreForDim('interest') },
    { label: '学习方法', score: scoreForDim('method') },
    { label: '词汇积累', score: scoreForDim('vocab') },
    { label: '家长陪伴', score: scoreForDim('parent') }
  ];

  function scoreForDim(key) {
    switch(key) {
      case 'decode': { const a = answers[3]; return a === 0 ? 85 : a === 1 ? 45 : 15; }
      case 'sentence': { const a = answers[4]; return a === 0 ? 85 : a === 1 ? 35 : 10; }
      case 'interest': { const a = answers[5]; return a === 0 ? 85 : a === 1 ? 40 : 10; }
      case 'method': { const a = answers[9]; return a === 0 ? 85 : a === 1 ? 45 : 15; }
      case 'vocab': { return Math.min(90, Math.max(20, score * 0.85)); }
      case 'parent': { const a = answers[10]; return a === 0 ? 85 : a === 1 ? 45 : 15; }
      default: return 50;
    }
  }

  ctx.clearRect(0, 0, w, h);

  // Background hexagon rings
  for (let ring = 1; ring <= 4; ring++) {
    ctx.beginPath();
    ctx.strokeStyle = '#F0E0D0';
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      const angle = Math.PI / 6 + (Math.PI * 2 / 6) * i;
      const rr = r * ring / 4;
      const x = cx + rr * Math.cos(angle);
      const y = cy + rr * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
  }

  // Axis lines
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 6 + (Math.PI * 2 / 6) * i;
    ctx.beginPath();
    ctx.strokeStyle = '#E8D5C0';
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    ctx.stroke();
  }

  // Data polygon
  ctx.beginPath();
  ctx.fillStyle = 'rgba(245, 166, 35, 0.2)';
  ctx.strokeStyle = '#F5A623';
  ctx.lineWidth = 2.5;
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 6 + (Math.PI * 2 / 6) * i;
    const val = dims[i].score / 100;
    const rr = r * val;
    const x = cx + rr * Math.cos(angle);
    const y = cy + rr * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Dots at vertices
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 6 + (Math.PI * 2 / 6) * i;
    const val = dims[i].score / 100;
    const rr = r * val;
    const x = cx + rr * Math.cos(angle);
    const y = cy + rr * Math.sin(angle);
    ctx.beginPath();
    ctx.fillStyle = '#F5A623';
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Labels
  ctx.fillStyle = '#6B6B6B';
  ctx.font = '12px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 6 + (Math.PI * 2 / 6) * i;
    const lr = r + 24;
    const x = cx + lr * Math.cos(angle);
    const y = cy + lr * Math.sin(angle) + 4;
    ctx.fillText(dims[i].label, x, y);
  }
}

      '孩子可能通过自然拼读系统训练、大量绘本阅读或双语环境建立了这个能力。关键是这种“自动化”不是天生的，而是反复练习后大脑将解码过程从“有意识加工”转移到“无意识自动化”的结果——就像你看到中文“猫”字不需要想笔画一样。',

      '孩子需要想一想才能读出单词，这在学习科学中叫“有意识解码阶段”——大脑还在用前额叶（负责有意识思考）来处理解码，而不是用枕颞区（负责自动识别）。这就像刚开始学开车，每个动作都要想一下“踩离合、挂挡、松手刹”，还没形成肌肉记忆。处在“有意识解码”阶段的孩子，读一个5词句子大脑已经做了25次以上有意识决策，读完时脑力已经耗尽，根本没余力理解句意。',
      '根本原因通常不是孩子不努力，而是“解码练习量”不够——大脑需要约200-500次“见词-读词”的正确重复才能将一个单词的识别自动化。学校英语课每周2-3节，每节课实际朗读时间可能不超过5分钟，这样的练习密度远不足以建立自动化。',
      '如果这个阶段拖太久（超过6-12个月），孩子会形成“逐字母拼读”的惯性模式，越到高年级越吃力。更危险的是，解码慢→读得累→不想读→练习少→解码更慢，形成恶性循环，最终导致“三年级断层”——三年级课文长度翻倍时直接崩溃。',

    else makeDim('语音解码','🔤',15,'薄弱','low',
      '孩子尚未建立字母与声音的基本对应关系，在学习科学中属于“前解码阶段”——大脑还没有形成任何字母→语音的神经连接。这并不意味着孩子有问题，而是说明之前的英语接触没有专门训练过这项能力。自然拼读不是“学了就会”，而是需要系统的、多感官的、循序渐进的训练。研究表明，没有解码能力直接开始“阅读”的孩子，失败率高达85%以上——就像让一个不认识数字的孩子直接做加减法。',
      '通常是以下原因之一：① 英语启蒙以“磨耳朵”为主，听了大量儿歌但没有建立声音与文字的联系；② 学校英语教学以跟读、背诵为主，跳过了解码环节；③ 开始英语学习的年龄较大（8岁以上），错过了大脑对语音最敏感的窗口期（3-7岁布罗卡斯区活跃期）。无论哪种原因，现在补救都还来得及——8岁之前大脑的神经可塑性仍然很强。',
      '没有解码能力的孩子进入三年级后会遭遇“断崖式”困难：课文从对话变成段落，单词从3-4个字母变成8-10个字母，英语从“会读就行”变成“读懂了才能做题”。如果三年级前不补齐解码短板，孩子可能从此对英语失去信心，初中阶段差距会拉大到无法追赶的程度。',
      '① 立即开始系统自然拼读训练，从26个字母的基本音（letter sound）开始，注意是“发音”不是“字母名”——孩子要知道a发/æ/而不是读字母“A”；② 用多感官教学法：同时调动视觉（看字母）、听觉（听发音）、动觉（用手指在空中写），三个感官通道同时激活，记忆效率是单一通道的3倍；③ 每次只教1-2个新音，用含该音的高频词大量练习，确保掌握后再推进，切忌贪多求快。');

      '这是本次诊断发现的**最核心问题**——孩子能读单个词，但读完不知句意。在认知心理学中这被称为“解码-理解脱节”：大脑的工作记忆（working memory）容量是有限的，当所有脑力都消耗在逐词解码上时，就没有余力去整合句子的整体含义。就像一个翻译逐字翻译每个单词，但翻译完最后一个字时已经忘了第一个字是什么意思。这就是我们反复强调的“拼读断层”——孩子不是读不懂，是读完之后忘了自己读了什么。',
      '根本原因有两个层面：① 表层——解码速度不够快，没有自动化。当解码还处于“有意识加工”阶段时，大脑的认知资源被低阶任务占满，高阶的语义整合无法进行。② 深层——缺少“句子整体输入”训练。很多孩子的英语学习停留在“单词→中文翻译”模式，眼睛看到cat→脑子里蹦出“猫”→再看下一个词，从来没有练习过把整句当作一个意义单位来处理。',
      '这是最需要警惕的问题。如果不修复这个断层，三年级教材一上来就是100词以上的段落阅读，孩子会直接“断崖式”掉队。更可怕的是，老师和家长往往误判为“孩子不认真”或“单词量不够”，然后让孩子背更多单词——这恰恰加重了问题，因为孤立背词只会强化“词→翻译”模式，进一步压制句子理解能力。',
      '① 核心方案：每天15分钟“句子整体输入”训练。具体做法——播放一个6-10词的英文句子音频（如The cat is sleeping on the soft mat.），让孩子闭眼听3遍，不看文字，然后问“你听到了什么？”（允许用中文回答，目的是确认理解而非测试英文）；听完后再展示文字，让孩子跟读，最后指着句子问“这句话在说什么”；② 用“五指复述法”：读完一个句子后，用5根手指分别代表“谁、在哪、干什么、为什么、结果怎样”，帮孩子建立句子结构意识；③ 初期选材标准：每句不超过8个词，包含1个核心动词，配1张图。不求量、只求懂——宁可一天就读透3个句子，也不要囫囵吞枣读10个。');

      '孩子面对句子直接放弃或说“看不懂”——这已经不是能力问题，而是信心和动力已经受到损伤。在学习心理学中，这对应着“习得性无助”的早期信号：孩子之前可能多次尝试读句子但失败，大脑形成了“句子=我搞不定的东西”的负向联结，遇到句子时产生的不是好奇而是焦虑。神经科学研究表明，焦虑状态下杏仁核（大脑的情绪中枢）过度活跃会直接抑制前额叶（负责思考理解的区域）的功能——孩子不是“不想”理解，而是大脑在焦虑下“不能”理解。',
      '通常是多重困难叠加的结果：① 解码能力几乎为零——单词都不认识，句子更无从谈起；② 自信心已经受损——之前可能被老师或家长批评过“怎么这么简单都看不懂”，形成了“我不行”的自我认知；③ 学习方法完全错位——可能一直在用“背单词→做翻译题→对答案”的模式，从未体验过“我能读懂一个完整的英语句子”的成就感。',
      '这是最紧急的信号。如果再继续当前的学习方式，孩子不仅英语会越来越差，更严重的是会形成“我不擅长英语”的固化信念——这种自我认知一旦形成，到初中阶段几乎无法扭转。而且英语的落后会拖累整体学业信心，因为“英语不好”的标签会泛化到“我学习不好”。',
      '① 第一步不是学，是“破冰”——完全停掉刷题和单词表背诵，换成像看英语动画片（带中文字幕）、听英语儿歌、玩英语互动App这种“零压力接触”，目标是让孩子重新觉得“英语也可以是好玩的”；② 第二步：从3-4词的最短句子开始（如I see a cat. / He is big. / She can run.），每句配一张大图，大人先读一遍，孩子跟读，读完就过，不对错做任何评判，连续读3天后再换新句——这个阶段的唯一目标不是“学会”，而是“我愿意读”；③ 第三步：当孩子连续一周不抗拒读句子后，引入“小老师模式”——让孩子做小老师“教”家长读，角色反转能快速重建信心，因为“教别人”本身就暗示着“我已经会了”。');

      '内驱力不是天生的，而是“恰到好处的挑战”培养出来的——阅读材料的难度刚好在孩子的最近发展区（比现有水平高一点点，跳一跳够得着），既不无聊（太简单）也不焦虑（太难）。孩子每次成功读完一本书，大脑都会释放多巴胺，形成“阅读=愉悦”的神经回路。',

      '通常有三个可能的原因，需要家长自行判断：① 难度不匹配——读物太难（挫败感强，大脑逃避）或太简单（无聊，没有挑战感）；② 内容不匹配——孩子对恐龙感兴趣但给的读物是公主故事，或者反之；③ 环境干扰——阅读时旁边有更刺激的选项（手机/iPad/电视），大脑的多巴胺系统自然会选择更高刺激的活动。',
      '如果这个状态持续1年以上，孩子会形成“阅读=无聊任务”的固化认知。更棘手的是，阅读兴趣的缺失会导致阅读量不足→能力停滞→读得更累→更不想读，形成负向螺旋。小学中年级（3-4年级）是阅读兴趣的关键分化期——在这个阶段爱上阅读的孩子和讨厌阅读的孩子，到初中时的英语差距可达4个年级以上。',

      '孩子对英语产生抵触——这是本次诊断中需要优先处理的信号。在学习心理学中，抵触情绪标志着“情感过滤器”（affective filter）已经升高。语言学家克拉申的研究表明，当情感过滤器升高时（焦虑、抵触、压力），语言输入会直接被大脑屏蔽——就像一扇关上的门，不管你塞多少知识进去，都进不去。不是孩子学不会，是大脑在情绪关闭状态下“听不进去”。',
      '抵触通常不是突然产生的，而是长期负面体验的累积：① 反复失败——在英语学习中持续体验“我做不到”的感觉，大脑为了自我保护而选择“那我不做了”；② 负面比较——“你看XX家孩子英语多好”这类比较会直接打击自我效能感；③ 惩罚性学习——英语和“不好好读就挨骂/罚抄/不许玩”形成了条件反射式的负面联结。每到英语时间，孩子的杏仁核（大脑恐惧中枢）先于前额叶（思考中枢）被激活。',
      '这是整个英语学习路径中最危险的信号，必须优先处理——在抵触情绪未化解之前，任何教学方法都不会有效果。更严重的是，这种抵触如果持续到小学高年级，会固化为“英语=我不行的领域”的身份认同，届时即使有好方法、好老师也很难扭转，因为孩子已经从内心深处“放弃”了英语。',
      '① 第一步：完全停掉所有可能引起抵触的学习行为——不催、不比、不考、不罚。至少2-4周内不主动提起“学英语”三个字。这不是放弃，是给大脑的恐惧回路降温；② 第二步：用“特洛伊木马”策略重新接触英语——选一部孩子最喜欢的动画片的英文版（开着中文字幕看），或者玩一个带英文配音的游戏。目标不是“学英语”，而是让孩子无意中发现“原来英文也可以是好玩的”；③ 第三步：创造一次“微小成功”——找一个超级简单的任务（比如读一个3词的句子或认一个单词），确保孩子100%能做到，然后真诚地庆祝这个成功。一次真实的成功体验，胜过100次“你一定可以的”的空洞鼓励。重建信心的公式是：小成功→小庆祝→再小成功→再庆祝，循环至少4-6次后才能开始真正的教学。');

      '孩子正在进行系统的拼读+阅读训练且有真人老师跟进——这对应着目前国际阅读研究公认最有效的“结构化读写教学”（Structured Literacy）模式。该模式强调：系统化（有明确的教学序列，从易到难）、显性化（规律直接教，不等孩子自己悟）、多感官（看听说写同时调动）、诊断式（根据孩子表现动态调整教学）。国际阅读障碍协会（IDA）的元分析表明，结构化教学的效果是碎片化教学的2-3倍。真人老师跟进保证了“即时反馈”——研究表明即时反馈的学习效果比延迟反馈高50%以上。',

      '孩子当前的学习方式以“磨耳朵”（听儿歌、看动画）或“刷单词App”为主——这类方法的核心假设是“大量输入就会自然输出”。但语言习得研究早已推翻了这个假设：单纯的输入（尤其是没有互动、没有反馈的输入）只能培养“语感”，不能培养“阅读能力”。两者的区别就像：每天听音乐 ≠ 会识谱、会弹琴。更关键的是，这类产品设计遵循的是“上瘾机制”而非“学习机制”——积分、排名、打卡这些外部激励在早期有效，但3-6个月后新鲜感消退，孩子就会出现“刷了但记不住”的瓶颈。',
      '这非常普遍——80%以上的家长为孩子选择的都是这类产品，因为它们体验好、孩子不抗拒。问题不在产品本身，而在于它只是学习闭环中的“输入”环节，缺少了两样关键的东西：① “解码训练”——把听到的声音和看到的文字建立对应关系；② “输出和反馈”——孩子读完一句话后，有没有人/系统告诉他读得对不对、理解得对不对。没有反馈的学习就像蒙着眼睛投篮——投100次也不知道有没有投进。',
      '长期依赖“只有输入没有输出”的学习方式，最大的风险是制造“虚假的安全感”——家长觉得“孩子每天都在学”，孩子觉得“我都会了”，但一到真正的阅读场景（看到一本没见过的英语书要读出来并理解），才发现完全做不到。这种“看起来在学、实际上没学会”的状态一旦持续超过1年，到中高年级暴露出来时已经浪费了大量宝贵时间。',
      '① 在现有App/课程基础上，每天加15分钟“结构化阅读”——用分级读物（如RAZ、牛津树），按照“听一遍→跟读一遍→自己读一遍→回答一个问题”的流程，把被动的“输入”变成主动的“处理”；② 选一个能与真人老师互动的平台（哪怕是每周1次25分钟的线上课），因为“反馈”是学习闭环中最关键也最容易被忽略的环节——知道错了并立刻纠正，学习效率提升50%以上；③ 如果不想加课，至少做到：每次孩子读完一本绘本后，用中文问他一个简单问题（“刚才那个故事里，小狗最后找到骨头了吗？”）——这个动作叫作“理解确认”，能迫使大脑从“读词模式”切换到“读意思模式”。');
    else makeDim('学习方法','🎯',15,'严重缺失','low',
      '孩子目前没有课外英语训练，仅依赖学校每周2-3节英语课。做一个简单的算术：学校每节课实际让学生开口读的时间平均不超过5分钟（大部分时间在讲规则、管纪律、做练习册），一周累计朗读时间约10-15分钟。而研究显示，要建立基本的英语阅读能力，每周需要至少100-150分钟的“有效朗读时间”（指真正在阅读、有反馈的时间）。差距是10倍。这不是孩子的错，也不是学校的错——学校的课时和师生比决定了它无法提供足够的个体化阅读训练。',
      '学校的英语课设计目标是“扫盲”而非“培养阅读能力”——它要保证全班40-50个孩子都跟上进度，天然的大班教学决定了教学内容是“最小公倍数”式的。而英语阅读能力（尤其是解码和流利度）是高度个体化的——每个孩子的解码速度、词汇量、兴趣点都不同，只有一对一的或者自适应的训练才能真正解决。',
      '这是一个结构性问题，如果不主动解决，差距会随时间指数级拉大：二年级时可能只是“考试比同学少几分”，到四年级已经变成“上课完全听不懂老师在讲什么”，到六年级时英语事实上已经“报废”——初中阶段即使想补救，6年的欠账也很难在短时间内还清。英语是典型的“滚雪球”学科：前面的没学会，后面的更学不会。',
      '① 第一步：每天挤出15分钟——可以是晚饭后、可以是睡前。不需要等到“有时间了再好好学”，15分钟的高效训练远大于周末2小时的疲劳轰炸。大脑在短时高频的刺激下学习效率最高（这叫“间隔效应”，是学习科学最稳定的发现之一）；② 选择一套成体系的分级读物+音频，按“先听后读再理解”的顺序每天推进。如果家长英语不好，选带音频或AI纠音的产品，关键是有“反馈”——孩子读了之后要知道读得对不对；③ 如果预算有限，至少做到：每周2-3次，每次15-20分钟，由家长陪孩子一起读一本简单的英语绘本。家长不需要英语很好，只需要坐在旁边，用中文问一句“这句话在说什么”——这个陪伴动作本身就能把阅读完成率从30%提升到70%以上。');

      '“背了忘”不只是浪费时间——更严重的后果是孩子会形成“我记不住”的自我认知。一旦孩子相信“我记性不好”，这个信念本身就会抑制记忆表现（心理学中的“刻板印象威胁”效应）。很多孩子不是记忆力差，是被错误的记忆方法坑了之后，错误地归因到了自己身上。',

      '词汇量不足通常不是“记性不好”，而是输入方式错了。传统单词表/单词App采用的“explicit learning”（有意识记忆）对6-10岁的孩子效果极差，因为这个年龄段的大脑前额叶（负责有意识记忆的脑区）还未发育成熟，而负责“无意识吸收”的基底神经节和 cerebellum 正处于最活跃的时期。这意味着：让孩子“有意识背单词”是在用他最不擅长的脑区做最吃力的工作，效率自然极低。孩子这个阶段最擅长的是通过“反复接触”无意识地吸收语言——就像学母语时不用背“妈妈”这个词，听多了自然就会了。',
      '词汇负循环是最难打破的：词汇少→读不懂→不想读→词汇更少。如果不换方法而只是“更努力地背”，只会加速这个恶性循环。更严重的是，词汇量的差距会直接限制阅读理解的进步，进而拖累整个英语学科的表现——词汇量是中国学生英语成绩的单一最大预测因子。',
      '① 立即停止孤立背单词！改为每天“可理解输入”——选最简单的分级读物（Level A或Level 1），确保每页生词不超过2个，每天读3-5本（薄的），同一本书可以连续读3-4天直到孩子能自己读出来。这个阶段的目标不是“记单词”，而是让孩子的大脑习惯“在书上看到英文单词”这件事；② 用“全身反应法”（TPR）学动作词：教run就真的跑起来，教jump就跳起来，教eat就做出吃的动作。身体动作参与记忆时，大脑会同时激活运动皮层和海马体，记忆强度远大于单纯看词卡；③ 选材策略：优先选“图文严格对应”的读物——图上有一只猫，文字就是“cat”或“The cat”，孩子可以通过图来推断文字的意思，这种“主动猜→验证”的过程本身就是最有效的词汇习得方式。');

  // ── 家长陪伴 (Q10) ──

      '大多数家长以为自己需要“教”孩子，这是最大的误解。实际上家长最有效的角色有两个：① “仪式启动者”——每天在固定时间说一句“来，我们读一小会儿英语吧”，这个简单的 verbal cue 会逐渐形成条件反射，到时间孩子的大脑自动进入学习状态；② “进步见证者”——读完一本书后真诚地说一句“哇你今天比昨天读得顺多了”，这种即时的正面反馈是AI或App永远无法替代的。孩子为父母的认可而学的动力，远大于为积分或排名而学的动力。',
      '如果家长完全不参与而完全依赖App或机构，一个隐藏的风险是：孩子的学习变成了“黑箱”——家长不知道孩子到底学得怎么样，孩子也因为没有人关心而逐渐降低投入度。特别是遇到瓶颈期时（每个孩子都会遇到），没有家长的鼓励和陪伴，孩子很容易从“在学但进步慢”滑向“不学了”。',
      '① 用“15分钟高质量陪伴”代替“1小时无质量陪同”：关掉手机、关掉电视，15分钟内只做一件事——听孩子读一本绘本，读完后真诚地给一个具体的表扬（不是“你真棒”，而是“今天这几个长单词你都读对了，进步好大！”），具体的表扬能让孩子明确知道“我做什么得到了认可”，从而有方向地继续努力；② 如果实在太忙，至少用“间接陪伴”——在孩子开始用App或读书前，发一条语音微信（如果不在家）或者贴一张便利贴在书上：“宝贝，妈妈今天加班，但很期待听到你今天读的故事，回来讲给我听哦！”这30秒的情感联结，就是孩子独自学习的动力来源；③ 选一个孩子自己就能操作的学习工具（如鼎牛AI系统），家长只需要验收成果而不需要全程陪同——把有限的精力花在最关键的“仪式启动”和“成果庆祝”两个环节上。');
    else makeDim('家长陪伴','👨‍👩‍👧',15,'缺失','low',
      '您几乎没有时间陪孩子学英语——首先需要说的是，这不是您的错。当代家长面临的工作和生活压力已经足够大，要求每个家长都做“全天候教育者”本身就不现实。但重要的是理解：家长不参与≠孩子学不好——关键在于是否有一个能替代家长部分功能的学习系统。一个理想的系统应该做到三件事：① 帮孩子启动（家长做不到的每日督促）；② 在孩子遇到困难时提供即时帮助（家长做不到的实时辅导）；③ 让孩子感受到有人在乎他的进步（家长做不到的及时反馈和表扬）。',
      '零陪伴之所以影响学习效果，不是因为孩子“没人教”——好的教学系统可以替代教的功能。而是因为孩子缺少“社会性动力”——人是社会性动物，我们做一件事的深层动力往往来自“有人在看我、在乎我、为我骄傲”。当学习变成完全孤独的行为，而孩子又还小（10岁以下的孩子还没有发展出内在的长期目标驱动能力），学习动力会不可避免地衰退。',
      '完全依赖学校+App而无任何人际反馈的学习模式，最大的风险是“情感枯竭”——孩子可能在学习行为上还在继续（打卡、做题），但在情感上已经 disconnected（“反正没人管我学得怎么样，应付一下算了”）。这种表面在学、实际没走心的状态一旦持续，不仅英语能力停滞，更重要的是孩子会养成“半心半意”的学习习惯，影响所有学科。',
      '① 找一个有“真人老师”或“真人学伴”的学习方案，每周至少1次——不是需要老师教多少东西，而是需要有一个除了家长之外的“重要他人”来见证和认可孩子的进步。研究表明，哪怕每周只有一次25分钟的一对一真人互动，孩子的坚持率就能从自学的40%提升到85%以上；② 利用碎片时间做“微陪伴”——早晨送孩子上学的路上问一句“昨天英语读得怎么样呀？”，晚上到家看到孩子在读时走过去摸摸头说“加油哦”然后就去忙——这两个加起来不到2分钟的动作，已经足够让孩子知道“妈妈/爸爸在乎我在做什么”，这是一种“社会性在场”的心理学效应；③ 如果完全没有真人互动的预算，至少做到：在孩子学习的App或平台中设置一个“进步提醒”，当孩子完成一个里程碑时（连续学习7天、读完100本书等），把这条提醒截图贴在冰箱上或发到家庭群里，让孩子的努力“被看见”。');
  })();

  return dims;
}

function getCoreDiagnosis(score) {
  const issues = [];
  const q4 = answers[4], q5 = answers[5], q9 = answers[9];

  // Identify the 2-3 most critical issues
  if (q4 !== 0) issues.push({
    title: '拼读断层：会读词但读不懂句子',
    detail: '这是本次诊断发现的最核心问题。孩子的解码脑力占用了理解脑力，导致“读完就忘”。这个问题如果不修复，到三年级教材难度翻倍时会直接断崖式掉队。好消息是：断层是可以修复的，关键在于用“句子中心论”训练替代“单词中心论”模式。修复周期通常为1-3个月。'
  });
  if (q5 !== 0) issues.push({
    title: '阅读动力不足：尚未进入正向循环',
    detail: '孩子还没有体验到“越读越会、越会越爱读”的正向循环。当前的关键不是加大学习量，而是创造一次“我能读懂一个完整故事”的巅峰体验——一次成功的完整阅读，比100次半途而废的尝试更能激发内驱力。'
  });
  if (q9 !== 0 && q9 !== undefined) issues.push({
    title: '学习方法需要升级：缺少“输入→输出→反馈”闭环',
    detail: '当前学习方式偏重输入（听、看），缺少输出（读、说）和反馈（知道对错并纠正）。没有反馈的学习是“蒙着眼睛投篮”——练再多也不知道投没投进。加入真人互动或AI即时反馈，学习效率可提升50%以上。'
  });
  if (issues.length === 0) issues.push({
    title: '当前状态良好，重点是“保温+进阶”',
    detail: '孩子的基础能力扎实，没有明显的结构性缺陷。接下来的重点是避免平台期：在现有水平基础上增加阅读难度和广度，从“能读”升级到“悦读+深度理解”，防止在舒适区停留过久导致进步停滞。定期（每3-4个月）重新评估一次，动态调整学习计划。'
  });

  return issues;
}

function getLearningPathStep(score) {
  if (score >= 80) return [
    { title:'第1步：巩固根基', time:'1-2个月', goal:'解码速度达到每分钟60词以上，从“能读”到“读得快”', method:'每天15分钟“计时朗读”：用略低于当前水平的分级读物，计时1分钟看能读多少词，每周记录一次进步。同时系统学习复合元音（ai/ea/ou/oi等）和辅音丛（str/spl/scr等），补齐自然拼读高阶规则。', kpi:'一分钟内流畅朗读60词以上，准确率≥95%，且能复述内容大意。' },
    { title:'第2步：桥梁阅读', time:'2-4个月', goal:'从分级读物过渡到初级章节书，建立段落级理解力', method:'选用蓝思值300L-500L的桥梁书（如Magic Tree House前10册），每章读完后用“五指复述法”口头概括：谁、在哪、发生了什么、为什么、结果怎样。同时开始“默读训练”——从有声朗读逐步过渡到内心默读，这是阅读速度提升的关键转折。', kpi:'能独立读完一本3000词以上的初级章节书，并能回答5W1H类理解问题，准确率≥80%。' },
    { title:'第3步：自由阅读', time:'4-8个月', goal:'建立自主阅读习惯，从“学阅读”跨越到“通过阅读学”', method:'引入多元题材：科普（National Geographic Kids）、历史（Who Was系列）、冒险小说（Geronimo Stilton）。每周3次“自由选读”时间，孩子自己选书、自己决定读多久、不考核。同时开始“阅读策略训练”：预测（读前）、推断（读中）、总结（读后）。', kpi:'每月自主读完2-3本英文原版书（非教材），阅读时间从“任务”变为“自发行为”，孩子会主动要求“再看一本”。' }
  ];
  if (score >= 50) return [
    { title:'第1步：修复断层', time:'1-2个月', goal:'打破“词→翻译”模式，建立“句子=意义单位”的神经回路', method:'核心训练——每天15分钟“句子整体输入”：① 听整句音频（不看文字）→② 闭眼再听一遍→③ 看文字跟读→④ 用中文说出这句话在讲什么（确认理解）。选句标准：6-10词、单一主谓宾结构、配图。不求量，每天深度处理5-8个句子。', kpi:'孩子看到一个6-8词的新句子时，能在朗读完毕后自然说出句意（无需逐词翻译），准确率≥70%。' },
    { title:'第2步：流畅阅读', time:'2-4个月', goal:'解码速度自动化，为理解腾出脑力空间', method:'从RAZ Level C/D或牛津树Level 3-4开始，每本书读3遍：第1遍听音频跟读（建立声音-文字连接），第2遍自己指读（训练解码自动化），第3遍合上书用中文复述（确认理解）。每天1-2本，不求快、只求透。同时开始每天5分钟“拼读闪卡”训练，强化高频词自动识别。', kpi:'90%以上的CVC/CVCe单词（如cat, make）能在2秒内自动读出，读完一本Level D读物后能复述故事大意。' },
    { title:'第3步：能力跃升', time:'4-8个月', goal:'从依赖“外部支持”到形成“独立阅读能力”', method:'逐步减少“听音跟读”的依赖：① 第1个月：先听后读 → ② 第2-3个月：先读后听（自己先读一遍再听音频对照）→ ③ 第4个月起：只读不听。阅读材料从分级读物升级到简单桥梁书（蓝思值200L-350L）。加入“每日一写”：每天读完书后用一句话写出自己的感想（哪怕只是I like this book.），开始建立“读→理解→表达”的完整链条。', kpi:'能独立（不先听音频）读完一本Level F/G或同等难度的读物，理解准确率≥80%，且能写出1-2句简单的读后感。' }
  ];
  if (score >= 30) return [
    { title:'第1步：高效启蒙', time:'1-2个月', goal:'建立“英语=好玩”的第一印象，同时悄悄搭建语音意识基础', method:'① 每天看10-15分钟原版动画（Peppa Pig / Little Fox Level 1级别），开中文字幕，核心目标是让孩子喜欢上英语的声音和画面，不考核、不提问；② 每天5分钟“押韵游戏”：妈妈说bed，孩子说red/head/said中任意一个，在游戏中建立“英语的音是可以拆分的”这个意识（语音意识是自然拼读的前提）；③ 用TPR（全身反应法）学20个高频动作词：run/jump/eat/drink/sit/stand等，妈妈说词、孩子做动作。', kpi:'孩子不抵触看英语动画片，能跟着动画模仿出1-2个简单词或短语，能用动作回应至少15个TPR词汇。' },
    { title:'第2步：拼读入门', time:'2-4个月', goal:'系统建立字母→声音的对应关系，体验“我能自己读出来”的成就感', method:'从26个字母的基本发音（letter sound）开始，按照“单个辅音→短元音→CVC拼合→含有辅音丛的单词”顺序推进。每次只教1-2个新音，用多感官法：眼睛看字母形状、耳朵听发音、嘴巴大声读、手指在空中写。每学一个新音立即用含该音的简短读物（decodable books）练习——学了就用的即时成功感是这个阶段最强的动力来源。', kpi:'能正确读出所有26个字母的基本发音，能独立拼读50个以上的CVC单词（如cat/dog/big/run），能自己读完一本decodable book（每一页的文字都在拼读范围内）。' },
    { title:'第3步：阅读起飞', time:'4-8个月', goal:'从读词升级到读句，架起“词→句→段”的阅读桥梁', method:'当孩子能较轻松地解码单个单词后，开始引入简短的句子读物（每页1-2句，每句4-8词）。采用“示范→跟读→独立读→理解确认”四步法。同时保持每天10分钟的自由英语接触（动画、儿歌、英语小游戏），维持兴趣。关键转折点：当孩子第一次在读完后抬头笑着说“我知道这句话在说什么”的那一刻——这就是正向循环的起点，要拼命庆祝。', kpi:'能独立读完一本含完整句子的分级读物（如RAZ Level B/C），读完后能用中文说出每页的大意，且阅读时不再是“痛苦的表情”而是“专注甚至带点享受的表情”。' }
  ];
  return [
    { title:'第1步：急救重建', time:'1-2个月', goal:'彻底消除抵触情绪，重建“英语≠痛苦”的神经联结', method:'① 完全停掉所有可能引起孩子抵触的英语活动——不背单词、不做题、不考试、不比别人。至少2-4周的“英语戒断期”，让大脑的恐惧回路先降温；② 戒断期间用“特洛伊木马”策略重新引入英语：选孩子最爱看的动画片的英文版（带中文字幕），或者一个英语配音的手机游戏。不说是“学英语”，就说是“看动画/玩游戏”。目标：让孩子无意中发现英语也是可以有趣的；③ 创造一个“微小成功”时刻——找一个3-4词的超简单句子（如I am happy.），确保孩子一定能读对，然后真诚地庆祝。一次真实的成功＞100次空洞的鼓励。', kpi:'孩子连续1周不再对“英语”两个字有负面反应（不躲、不皱眉、不叹气），愿意在无压力场景下接触英语内容（哪怕只是看英文版动画片）。' },
    { title:'第2步：基础搭建', time:'2-5个月', goal:'用孩子不抗拒的方式，从头补齐拼读和词汇基础', method:'等情绪降温后，用“闯关游戏式”的方法开始系统自然拼读——把26个字母音设计成26个关卡，每过一个关有一个小奖励（不是物质奖励，而是一个好玩的互动——比如过关后可以和妈妈击掌/得到一个贴纸/看一集动画片）。核心原则：难度增量极小（每次只加一个新音），确保成功率在90%以上——大脑在“几乎不会失败”的体验中学习效率最高，因为多巴胺持续释放、焦虑感持续为零。', kpi:'在没有抵触情绪的前提下，掌握26个字母的基本发音和至少30个CVC单词的拼读，能自己读完一本超简单的decodable book。' },
    { title:'第3步：系统追赶', time:'5-12个月', goal:'在补齐基础后，按正常速度的三分之二追赶同龄水平', method:'基础打牢后（字母音+CVC单词+简单句子），开始按正常的学习路径加速推进——但永远保持“成功率优先于速度”的原则。鼎牛AI的自适应系统会实时监测孩子的掌握程度，自动调整难度和重复频率：已经掌握的内容少重复、避免无聊；薄弱点自动加练、确保过关才推进。家长只需要每周检查一次进度报告，确保孩子“在进步中”而非“在挣扎中”。', kpi:'12个月后，孩子的英语阅读能力从“几乎为零”追赶到能独立阅读RAZ Level D/E或同等级别的读物，且对英语的态度从“抵触”转变为“不抵触甚至偶尔主动”。' }
  ];
}

function buildCompleteReportHTML(score) {
  const peer = getPeerPercentile(score);
  const dims = getDimDetailedScores();
  const cores = getCoreDiagnosis(score);
  const steps = getLearningPathStep(score);
  const reportId = generateReportId();
  const ageLabel = getAgeLabel();
  const grade = getGradeLabel(totalScore);

  // Build dimension cards
  let dimItemsHTML = '';
  dims.forEach(d => {
    dimItemsHTML += `
    <div class=”dim-item”>
      <div class=”dim-item-header”>
        <span class=”dim-item-name”>${d.icon} ${d.name}</span>
        <span class=”dim-item-score” style=”color:${d.cls==='high'?'#27AE60':d.cls==='mid'?'#F5A623':'#E74C3C'}”>${d.score}分 · ${d.status}</span>
      </div>
      <div class=”dim-bar-wrap”>
        <div class=”dim-bar-fill ${d.cls}” style=”width:${d.score}%”></div>
      </div>
      <div class=”dim-subtitle” style=”color:${d.cls==='high'?'#27AE60':d.cls==='mid'?'#F5A623':'#E74C3C'}”>📋 现状解读</div>
      <div class=”dim-item-body”>${d.analysis}</div>
      <div class=”dim-subtitle” style=”color:#6B6B6B;”>🔎 深层原因</div>
      <div class=”dim-item-body”>${d.rootCause}</div>
      <div class=”dim-subtitle” style=”color:#E74C3C;”>⚠️ 如果不干预</div>
      <div class=”dim-item-body”>${d.risk}</div>
      <div class=”dim-subtitle” style=”color:var(--primary-dark);”>✅ 针对性提升方案</div>
      <div class=”dim-item-body”>${d.solution}</div>
    </div>`;
  });

  // Build core diagnosis
  let coreHTML = '';
  cores.forEach((c, i) => {
    coreHTML += `
    <div class=”path-step” style=”background:#FFFBF5;padding:12px;border-radius:10px;margin-bottom:8px;”>
      <div class=”path-step-num” style=”background:${i===0?'#E74C3C':'#F5A623'};”>${i+1}</div>
      <div class=”path-step-info”>
        <div class=”step-title”>${c.title}</div>
        <div class=”step-desc”>${c.detail}</div>
      </div>
    </div>`;
  });

  // Build learning path
  let stepsHTML = '';
  steps.forEach((s, i) => {
    stepsHTML += `
    <div class=”path-step”>
      <div class=”path-step-num”>${i + 1}</div>
      <div class=”path-step-info”>
        <div class=”step-title”>${s.title} <span style=”font-size:11px;color:var(--text-light);”>⏱ ${s.time}</span></div>
        <div class=”step-desc”><b>目标：</b>${s.goal}</div>
        <div class=”step-desc” style=”margin-top:4px;”><b>方法：</b>${s.method}</div>
        <div class=”step-desc” style=”margin-top:4px;color:var(--success);”><b>✅ 达标标志：</b>${s.kpi}</div>
      </div>
    </div>`;
  });

  return `
  <hr class=”divider”>
  <div style=”text-align:center;font-size:13px;color:var(--primary);font-weight:700;margin-bottom:12px;”>
    🔓 完整诊断报告已解锁
  </div>

  <div class=”report-header”>
    <div class=”cert-badge”>🏆 鼎牛阅读 · 正式诊断报告</div>
    <h3>${grade} · 英语阅读能力深度评估</h3>
    <div class=”report-id”>诊断编号：${reportId}　|　年龄区间：${ageLabel}　|　${new Date().toLocaleDateString('zh-CN')}</div>
  </div>

  <div class=”peer-compare”>
    <h4>📊 同龄孩子对比区间</h4>
    <div class=”peer-bar-wrap”>
      <div class=”peer-bar-fill” style=”width:${peer.pct}%;background:${peer.color};”></div>
      <div class=”peer-bar-marker” style=”left:${peer.pct}%;”></div>
    </div>
    <div class=”peer-labels”><span>后50%</span><span>中等</span><span>前25%</span><span>前10%</span></div>
    <div class=”peer-rank”>在 <b>${ageLabel}</b> 同龄孩子中，您的孩子处于 <b style=”color:${peer.color};”>${peer.label}</b> 区间</div>
    <div style=”font-size:12px;color:var(--text-light);margin-top:6px;line-height:1.6;”>此对比基于英语阅读能力的6个核心维度综合评估。同龄数据参考了全国30万+样本的分布区间。请注意：排名高低不代表孩子的好坏——它只是帮您看清当下所处的位置，为下一步行动提供方向。</div>
  </div>

  <div class=”dim-detail” style=”background:#FFFBF5;border-radius:14px;padding:16px;margin-bottom:16px;border:1px solid #FDE8E8;”>
    <h4>🚨 核心问题诊断</h4>
    ${coreHTML}
  </div>

  <div class=”dim-detail”>
    <h4>🔬 六维能力深度解析</h4>
    ${dimItemsHTML}
  </div>

  <div class=”path-section”>
    <h4>🗺️ 专属学习路径规划</h4>
    <p style=”font-size:12px;color:var(--text-light);margin-bottom:12px;”>以下路径根据孩子的诊断结果量身定制。每个阶段都包含目标、方法和可验证的达标标志——让您不只是“感觉孩子进步了”，而是能清晰地看到进步的刻度。</p>
    ${stepsHTML}
  </div>

  <button class=”btn-print” onclick=”printReport()”>🖨️ 打印完整报告 / 保存为PDF</button>
  <p style=”font-size:11px;color:#BBB;text-align:center;margin-bottom:12px;”>建议打印后贴在学习桌前，作为阶段路线图参考</p>
  `;
}

function printReport() {
  window.print();
}

function retakeQuiz() {
  currentQ = 0;
  answers = {};
  multiSelections = {};
  totalScore = 0;
  questions = [ageQuestion];
  renderStart();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function submitLead() {
  const name = document.getElementById('inputName').value.trim();
  const phone = document.getElementById('inputPhone').value.trim();
  const age = document.getElementById('inputAge').value.trim();

  if (!name || !phone) {
    alert('请至少填写您的称呼和手机号码，老师才能联系到您哦～');
    return;
  }
  if (!/^1\d{10}$/.test(phone)) {
    alert('请输入正确的11位手机号码');
    return;
  }

  // Build lead record
  const lead = {
    name, phone, age,
    score: totalScore,
    grade: getGradeLabel(totalScore),
    time: new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })
  };

  // Save to localStorage (backup)
  const leads = JSON.parse(localStorage.getItem('dingniu_leads') || '[]');
  leads.unshift(lead);
  localStorage.setItem('dingniu_leads', JSON.stringify(leads));

  // Send to 飞书群机器人
  sendToFeishu(lead);

  // Show success
  const btn = document.querySelector('.btn-submit');
  btn.textContent = '✅ 提交成功！老师将在24小时内联系您';
  btn.style.background = 'linear-gradient(135deg, #27AE60, #2ECC71)';
  btn.style.boxShadow = '0 4px 16px rgba(39,174,96,0.3)';
  btn.disabled = true;
}

function sendToFeishu(lead) {
  const colorMap = {
    '阅读小达人': 'green',
    '拼读断层预警': 'orange',
    '启蒙关键期': 'red',
    '紧急状态': 'red'
  };

  fetch('https://open.feishu.cn/open-apis/bot/v2/hook/396a2ada-4740-4437-b082-997d049d1b57', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      msg_type: 'interactive',
      card: {
        header: {
          title: { content: '🔔 新线索来了！' + lead.name + ' · ' + lead.score + '分', tag: 'plain_text' },
          template: colorMap[lead.grade] || 'blue'
        },
        elements: [
          { tag: 'div', text: { content: '👤 称呼：**' + lead.name + '**', tag: 'lark_md' } },
          { tag: 'div', text: { content: '📱 手机：**' + lead.phone + '**', tag: 'lark_md' } },
          { tag: 'div', text: { content: '👶 孩子年龄：**' + (lead.age || '未填') + '**', tag: 'lark_md' } },
          { tag: 'div', text: { content: '📊 诊断：**' + lead.grade + '**（' + lead.score + '/100分）', tag: 'lark_md' } },
          { tag: 'hr' },
          { tag: 'div', text: { content: '⏰ ' + lead.time + '　|　💾 本地已备份', tag: 'lark_md' } },
          { tag: 'note', elements: [
            { tag: 'plain_text', content: '请尽快联系家长，抢占先机！' }
          ] }
        ]
      }
    })
  }).then(r => r.json()).then(data => {
    console.log('飞书推送成功', data);
  }).catch(err => {
    console.error('飞书推送失败（本地已备份）', err);
  });
}

function getGradeLabel(score) {
  if (score >= 80) return '阅读小达人';
  if (score >= 50) return '拼读断层预警';
  if (score >= 30) return '启蒙关键期';
  return '紧急状态';
}

// ===== ADMIN VIEW =====
function renderAdmin() {
  progressWrap.classList.add('hidden');
  const leads = JSON.parse(localStorage.getItem('dingniu_leads') || '[]');

  let rowsHTML = '';
  if (leads.length === 0) {
    rowsHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#999;">暂无数据，等有人填完问卷就会出现在这里</td></tr>';
  } else {
    leads.forEach((l, i) => {
      rowsHTML += `
        <tr>
          <td>${i + 1}</td>
          <td><b>${l.name}</b></td>
          <td>${l.phone}</td>
          <td>${l.age || '-'}</td>
          <td><span class="tag tag-${l.grade}">${l.grade}</span> ${l.score}分</td>
          <td>${l.time}</td>
        </tr>`;
    });
  }

  cardArea.innerHTML = `
    <div style="padding:8px 0;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <div>
          <div style="font-size:20px;font-weight:800;">📊 线索管理后台</div>
          <div style="font-size:13px;color:var(--text-light);">共 <b>${leads.length}</b> 条线索（数据存储在浏览器本地）</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-prev" style="padding:8px 16px;font-size:13px;flex:none;" onclick="exportCSV()">导出CSV</button>
          <button class="btn btn-prev" style="padding:8px 16px;font-size:13px;flex:none;color:#E74C3C;" onclick="clearLeads()">清空</button>
          <button class="btn btn-prev" style="padding:8px 16px;font-size:13px;flex:none;" onclick="retakeQuiz()">返回问卷</button>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead>
            <tr style="background:#FFF8EC;text-align:left;">
              <th style="padding:12px;border-bottom:2px solid var(--border);">序号</th>
              <th style="padding:12px;border-bottom:2px solid var(--border);">称呼</th>
              <th style="padding:12px;border-bottom:2px solid var(--border);">手机号</th>
              <th style="padding:12px;border-bottom:2px solid var(--border);">孩子年龄</th>
              <th style="padding:12px;border-bottom:2px solid var(--border);">诊断结果</th>
              <th style="padding:12px;border-bottom:2px solid var(--border);">提交时间</th>
            </tr>
          </thead>
          <tbody>${rowsHTML}</tbody>
        </table>
      </div>
      <div style="margin-top:16px;padding:12px;background:#FFFBF5;border-radius:8px;font-size:12px;color:var(--text-light);line-height:1.8;">
        💡 <b>提示：</b>数据保存在当前浏览器的本地存储中。<br>
        🔗 你可以在当前浏览器访问 <b>?admin</b> 随时查看线索。<br>
        ⚠️ 更换浏览器或清除浏览器数据会导致线索丢失。正式使用建议接入后端接口存储。
      </div>
    </div>
  `;
}

function exportCSV() {
  const leads = JSON.parse(localStorage.getItem('dingniu_leads') || '[]');
  if (leads.length === 0) { alert('没有数据可导出'); return; }
  let csv = '﻿序号,称呼,手机号,孩子年龄,诊断等级,分数,提交时间\n';
  leads.forEach((l, i) => {
    csv += `${i + 1},${l.name},${l.phone},${l.age || ''},${l.grade},${l.score},${l.time}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '鼎牛阅读线索.csv'; a.click();
  URL.revokeObjectURL(url);
}

function clearLeads() {
  if (confirm('确定清空所有线索数据吗？此操作不可恢复！')) {
    localStorage.removeItem('dingniu_leads');
    renderAdmin();
  }
}

// ===== INIT =====
if (window.location.search.includes('admin')) {
  renderAdmin();
} else {
  renderStart();
}
</script>
